services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: nrfi
      POSTGRES_PASSWORD: nrfi
      POSTGRES_DB: nrfi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nrfi"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://nrfi:nrfi@db:5432/nrfi
      ODDS_API_KEY: ${ODDS_API_KEY}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      MODEL_ARTIFACT_PATH: ${MODEL_ARTIFACT_PATH:-models/nrfi_model.pkl}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "4000:8000"
    volumes:
      - model_store:/app/models

  scheduler:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://nrfi:nrfi@db:5432/nrfi
      ODDS_API_KEY: ${ODDS_API_KEY}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      MODEL_ARTIFACT_PATH: ${MODEL_ARTIFACT_PATH:-models/nrfi_model.pkl}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - model_store:/app/models
    command: ["/bin/bash", "/app/scripts/start_cron.sh"]

volumes:
  postgres_data:
  model_store:
