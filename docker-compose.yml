services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: nrfi
      POSTGRES_PASSWORD: nrfi
      POSTGRES_DB: nrfi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nrfi"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://nrfi:nrfi@db:5432/nrfi
      ODDS_API_KEY: ${ODDS_API_KEY}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      DISCORD_APP_ID: ${DISCORD_APP_ID:-}
      DISCORD_PUBLIC_KEY: ${DISCORD_PUBLIC_KEY:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      MODEL_ARTIFACT_PATH: ${MODEL_ARTIFACT_PATH:-models/nrfi_model.pkl}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "4000:8000"
    volumes:
      - model_store:/app/models

  scheduler:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://nrfi:nrfi@db:5432/nrfi
      ODDS_API_KEY: ${ODDS_API_KEY}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      MODEL_ARTIFACT_PATH: ${MODEL_ARTIFACT_PATH:-models/nrfi_model.pkl}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TZ: America/Los_Angeles
    volumes:
      - model_store:/app/models
    command: ["/bin/bash", "/app/scripts/start_cron.sh"]

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://nrfi:nrfi@db:5432/nrfi
      ODDS_API_KEY: ${ODDS_API_KEY}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      MODEL_ARTIFACT_PATH: ${MODEL_ARTIFACT_PATH:-models/nrfi_model.pkl}
    volumes:
      - model_store:/app/models
    command: ["python", "scripts/discord_bot.py"]

  frontend:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - backend
    environment:
      VITE_API_TARGET: http://backend:8000
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
  model_store:
